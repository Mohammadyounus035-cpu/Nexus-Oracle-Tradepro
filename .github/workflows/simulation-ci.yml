name: Simulation CI
on:
  push:
    paths:
      - 'simulation/**'
      - '.github/workflows/simulation-ci.yml'
  pull_request:
    paths:
      - 'simulation/**'
      - '.github/workflows/simulation-ci.yml'

jobs:
  simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r simulation/requirements.txt

      - name: Run lattice topology analysis
        run: python simulation/sovereign_lattice.py

      - name: Run multi-platform simulation
        run: python simulation/nexus_simulation.py

      - name: Upload simulation outputs
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: simulation/*.png